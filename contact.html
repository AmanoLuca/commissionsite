<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 | Luca Commission</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/contact.css">

</head>

<body>

    <div class="container">

        <!-- BANNER -->
        <header class="banner"></header>

        <div class="content">

            <!-- SIDEBAR -->
            <aside class="sidebar">

                <h2>MENU</h2>

                <ul class="menu">

                    <li>
                        <a href="index.html">
                            <i data-lucide="house"></i>
                            <span>홈</span>
                        </a>
                    </li>

                    <li>
                        <a href="notice.html">
                            <i data-lucide="bell"></i>
                            <span>커미션 안내</span>
                        </a>
                    </li>

                    <li>
                        <a href="sample.html">
                            <i data-lucide="image"></i>
                            <span>샘플</span>
                        </a>
                    </li>

                    <li>
                        <a href="request.html">
                            <i data-lucide="clipboard-pen"></i>
                            <span>커미션 신청</span>
                        </a>
                    </li>

                    <li class="active">
                        <a href="contact.html">
                            <i data-lucide="mail"></i>
                            <span>문의하기</span>
                        </a>
                    </li>

                </ul>

                <div class="info-box">

                    <h3 class="information-title">INFORMATION</h3>

                    <div class="social-links">
                        <a href="https://mail.naver.com/write?to=amano_luca@naver.com" target="_blank">
                            <i data-lucide="mail"></i>
                        </a>
                        <a href="#"><i data-lucide="link"></i></a>
                        <a href="#"><i data-lucide="message-circle"></i></a>
                    </div>


                    <div class="info-item">
                        <strong>⏰ 작업 기간</strong>
                        <p class="main-text">최대 7~21일 소요</p>
                    </div>

                    <div class="info-item">
                        <strong>💳 결제 방식</strong>
                        <p class="main-text">계좌이체</p>
                    </div>

                    <div class="info-item">
                        <strong>✉ 문의하기</strong>
                        <p class="main-text">DM 또는 이메일</p>
                    </div>

                    <div class="slot-box">

                        <h3>커미션 슬롯 현황</h3>

                        <div class="slot-icons">
                            <img src="images/slot-off.png" alt="빈 슬롯">
                            <img src="images/slot-off.png" alt="빈 슬롯">
                            <img src="images/slot-off.png" alt="빈 슬롯">
                            <img src="images/slot-off.png" alt="빈 슬롯">
                        </div>

                        <p id="slotText">불러오는 중...</p>

                    </div>

                </div>

            </aside>

            <!-- MAIN -->
            <main class="main">

                <h2 class="page-title">
                    <i data-lucide="mail"></i>
                    <span>문의하기</span>
                </h2>

                <div class="contact-info-box">
                    <p>⏱ 평균 답변 시간 : 1~3일</p>
                    <p>📌 커미션 의뢰는 '커미션 신청' 메뉴를 이용해주세요.</p>
                    <p>✉ 모든 문의는 순차적으로 답변드립니다.</p>
                </div>

                <div class="bottom-card">

                    <form class="contact-form" id="contactForm">

                        <input type="text" name="name" placeholder="이름 / 닉네임" required>

                        <input type="email" name="email" placeholder="이메일 (답변 받을 주소)" required>

                        <select name="type" required>
                            <option value="">문의 유형을 선택해주세요</option>
                            <option value="작업 관련 문의">작업 관련 문의</option>
                            <option value="사이트 문의">사이트 문의</option>
                            <option value="기타 질문">기타 질문</option>
                        </select>

                        <input type="text" name="title" placeholder="문의 제목" required>

                        <textarea name="message" rows="7" placeholder="문의 내용을 입력해주세요" required></textarea>

                        <input type="text" name="honeypot" style="display:none">

                        <label class="agree-box">
                            <input type="checkbox" required>
                            문의 내용을 확인했으며 안내 사항에 동의합니다.
                        </label>

                        <button type="submit">문의 보내기</button>

                    </form>

                    <div class="success-message" id="successMessage">
                        ✔ 문의가 정상적으로 접수되었습니다.<br>
                        1~3일 내로 답변드리겠습니다.
                    </div>

                </div>

            </main>

        </div>

    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        /* ---------------- EMAILJS INIT ---------------- */
        emailjs.init("bB2JUXxrY3nyiQnBt");

        /* ---------------- SUPABASE ---------------- */
        const mySupabase = window.supabase.createClient(
            "https://uoxrvoiwyazzwbxrvelw.supabase.co",
            "sb_publishable_op6pLQeM3uJPguTuxB_naw_OVylI7mA"

        );

        async function loadSiteSettings() {

            const { data, error } = await mySupabase
                .from("site_settings")
                .select("*")
                .eq("id", 1)
                .single();

            if (error || !data) {
                console.error("slot load error:", error);
                return;
            }

            const slotText = document.getElementById("slotText");
            if (!slotText) return;

            const open = Number(data.status ?? 0);
            const total = Number(data.total_slot ?? 0);

            slotText.classList.remove("slot-open", "slot-full");

            if (open >= total) {
                slotText.textContent = "FULL";
                slotText.classList.add("slot-full");
            } else {
                slotText.textContent = `${open} / ${total} OPEN`;
                slotText.classList.add("slot-open");
            }

            document.querySelectorAll(".slot-icons img")
                .forEach((img, index) => {
                    img.src = index < open
                        ? "images/slot-on.png"
                        : "images/slot-off.png";
                });
        }

        /* ---------------- INIT ---------------- */
        document.addEventListener("DOMContentLoaded", function () {

            lucide.createIcons();

            loadSiteSettings();

            const form = document.getElementById("contactForm");
            if (!form) return;

            const success = document.getElementById("successMessage");
            const button = form.querySelector("button");

            form.addEventListener("submit", async function (e) {

                e.preventDefault();

                if (form.honeypot?.value) return;

                button.disabled = true;
                button.textContent = "전송 중...";

                try {
                    const fd = new FormData(form);

                    const { error } = await mySupabase
                        .from("applications")
                        .insert({
                            name: fd.get("name"),
                            email: fd.get("email"),
                            type: fd.get("type"),
                            title: fd.get("title"),
                            message: fd.get("message"),
                            status: "pending"
                        });

                    if (error) throw error;

                    await emailjs.sendForm(
                        "service_vt6njoe",
                        "template_contact us",
                        form
                    );

                    form.reset();
                    success?.classList.add("show");

                } catch (err) {
                    console.error("신청 오류:", err);
                    alert("전송 실패");
                } finally {
                    button.disabled = false;
                    button.textContent = "문의 보내기";
                }
            });

        });
    </script>

</body>

</html>
