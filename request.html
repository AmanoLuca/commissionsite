<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커미션 신청 | Luca Commission</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/request.css">

</head>

<body>

    <div class="container">

        <!-- BANNER -->
        <header class="banner" aria-label="메인 배너"></header>

        <div class="content">

            <!-- SIDEBAR -->
            <aside class="sidebar">

                <h2>MENU</h2>

                <ul class="menu">

                    <li>
                        <a href="index.html">
                            <i data-lucide="house"></i>
                            <span>홈</span>
                        </a>
                    </li>

                    <li>
                        <a href="notice.html">
                            <i data-lucide="bell"></i>
                            <span>커미션 안내</span>
                        </a>
                    </li>

                    <li>
                        <a href="sample.html">
                            <i data-lucide="image"></i>
                            <span>샘플</span>
                        </a>
                    </li>

                    <li class="active">
                        <a href="request.html">
                            <i data-lucide="clipboard-pen"></i>
                            <span>커미션 신청</span>
                        </a>
                    </li>

                    <li>
                        <a href="contact.html">
                            <i data-lucide="mail-question"></i>
                            <span>문의하기</span>
                        </a>
                    </li>

                </ul>

                <div class="info-box">

                    <h3 class="information-title">INFORMATION</h3>

                    <div class="social-links">

                        <a href="https://mail.naver.com/write?to=amano_luca@naver.com" target="_blank">
                            <i data-lucide="mail"></i>
                        </a>

                        <a href="#" onclick="return false;">
                            <i data-lucide="link"></i>
                        </a>

                        <a href="https://open.kakao.com/o/sA2dFszi" target="_blank" rel="noopener noreferrer">
                            <i data-lucide="message-circle"></i>
                        </a>

                    </div>

                    <div class="info-item">
                        <strong>⏰ 작업 기간</strong>
                        <p class="main-text">최대 7~21일 소요</p>
                    </div>

                    <div class="info-item">
                        <strong>💳 결제 방식</strong>
                        <p class="main-text">계좌이체</p>
                    </div>

                    <div class="info-item">
                        <strong>✉ 문의하기</strong>
                        <p class="main-text">DM 또는 이메일</p>
                    </div>

                    <div class="slot-box">

                        <h3>커미션 슬롯 현황</h3>

                        <div class="slot-icons">
                            <img src="images/slot-off.png" alt="빈 슬롯">
                            <img src="images/slot-off.png" alt="빈 슬롯">
                            <img src="images/slot-off.png" alt="빈 슬롯">
                            <img src="images/slot-off.png" alt="빈 슬롯">
                        </div>

                        <p id="slotText">불러오는 중...</p>

                    </div>

                </div>

            </aside>

            <!-- MAIN -->
            <main class="main">

                <h2 class="page-title">
                    <i data-lucide="pencil"></i>
                    <span>커미션 신청</span>
                </h2>

                <div class="contact-info-box">
                    <p>🌸 신청 전 안내사항을 꼭 확인해주세요</p>
                    <p>⏱ 작업 기간 : 최대 7~21일</p>
                    <p>📌 신청서를 검토 후 수락 여부를 안내드립니다</p>
                </div>

                <div class="bottom-card">

                    <form class="contact-form" id="requestForm">

                        <label class="form-field">
                            <span>이름 / 닉네임</span>
                            <input type="text" name="name" placeholder="이름 / 닉네임" required>
                        </label>

                        <label class="form-field">
                            <span>이메일</span>
                            <input type="email" name="email" placeholder="이메일 (답변 받을 주소)" required>
                        </label>

                        <label class="form-field">
                            <span>신청 인원 수</span>
                            <input type="text" name="people" placeholder="예: 1인" required>
                        </label>

                        <label class="form-field">
                            <span>사용 용도</span>
                            <input type="text" name="usage" placeholder="개인소장 / 방송 / 굿즈 등" required>
                        </label>

                        <label class="form-field">
                            <span>신청 타입</span>
                            <select name="type" required>
                                <option value="">신청 타입을 선택해주세요</option>
                                <option value="아이콘">아이콘</option>
                                <option value="두상">두상</option>
                                <option value="반신">반신</option>
                                <option value="전신">전신</option>
                                <option value="기타">기타 / 상담 필요</option>
                            </select>
                        </label>

                        <label class="upload-box">
                            <input type="file" name="reference" accept="image/*" multiple>
                            <i data-lucide="image"></i>
                            <strong>참고 이미지 업로드</strong>
                            <span>클릭하거나 파일을 드래그해주세요</span>
                        </label>

                        <label class="form-field">
                            <span>내용</span>
                            <textarea name="message" rows="7" placeholder="캐릭터 설정, 외형 설명, 성격, 포즈, 분위기 등을 작성해주세요."
                                required></textarea>
                        </label>

                        <label class="agree-box">
                            <input type="checkbox" required>
                            <span>신청 내용을 확인했으며 커미션 안내 사항에 동의합니다.</span>
                        </label>

                        <button type="submit">커미션 신청하기</button>

                    </form>

                    <div class="success-message" id="successMessage">
                        신청서가 정상적으로 접수되었습니다.<br>
                        확인 후 안내드리겠습니다.
                    </div>

                </div>

            </main>

        </div>

    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>

</body>

</html>
